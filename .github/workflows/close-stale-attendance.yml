name: Close stale attendance

# Hourly hit to POST /api/cron/close-stale-attendance.
# Every iteration closes any OPEN/PAUSED attendance whose local calendar
# day (employee's stored timezone) is already over, stamping CLOCK_OUT
# at 23:59:59.999 of that day.
#
# Setup (one-time):
#   1. Repository → Settings → Secrets and variables → Actions
#      - secret  CRON_SECRET   = same value as the Vercel env var
#      - variable APP_URL      = https://your-prod-domain.example.com
#   2. Enable Actions on the repo if disabled.
#
# Note: GitHub may delay scheduled runs under heavy load; the lazy
# auto-close inside attendance.service is a safety net if a tick is
# skipped.

on:
  schedule:
    - cron: '5 * * * *'   # every hour at :05 UTC
  workflow_dispatch:       # allow manual runs from the Actions tab

jobs:
  close:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger close-stale-attendance
        env:
          APP_URL: ${{ vars.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::APP_URL variable or CRON_SECRET secret is not set"
            exit 1
          fi

          response=$(curl -sS -w "\n%{http_code}" -X POST \
            "$APP_URL/api/cron/close-stale-attendance" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")

          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n 1)

          echo "Status: $status"
          echo "Body:   $body"

          if [ "$status" != "200" ]; then
            echo "::error::Cron endpoint returned non-200 status"
            exit 1
          fi
